<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hyunwoo Yang — Gameplay Engineer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="image-slot.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  :root {
    --bg: #F4F2ED;
    --ink: #0D0C0A;
    --ink2: #3A3A36;
    --ink3: #7A7770;
    --accent: #D4581A;
    --accent-soft: rgba(212, 88, 26, 0.08);
    --border: rgba(13,12,10,0.14);
    --card: #FFFFFF;
    --ff-display: 'Bebas Neue', sans-serif;
    --ff-body: 'Space Grotesk', sans-serif;
    --ff-mono: 'Space Mono', monospace;
  }

  html, body { height: 100%; }
  html { font-size: 18px; }
  
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--ff-body);
    font-size: 18px;
    line-height: 1.55;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  ::selection { background: var(--accent); color: #fff; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--ink); }

  a { color: inherit; text-decoration: none; }
  button { background: none; border: none; font: inherit; color: inherit; cursor: pointer; padding: 0; }

  /* ====== NAV ====== */
  nav.topbar {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 100;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    padding: 22px 48px;
    background: var(--bg);
    border-bottom: 2px solid var(--ink);
    gap: 32px;
  }
  .nav-brand {
    display: flex; align-items: center; gap: 16px;
  }
  .brand-mark {
    width: 56px; height: 56px;
    background: var(--ink);
    color: var(--bg);
    font-family: var(--ff-display);
    font-size: 38px;
    display: flex; align-items: center; justify-content: center;
    letter-spacing: -0.02em;
  }
  .brand-name {
    font-family: var(--ff-mono);
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }
  .brand-name .brand-role {
    display: block;
    font-size: 13px;
    font-weight: 400;
    color: var(--ink3);
    letter-spacing: 0.2em;
    margin-top: 4px;
  }
  .nav-links {
    display: flex; gap: 6px;
    justify-self: center;
  }
  .nav-link {
    position: relative;
    font-family: var(--ff-mono);
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 18px 28px;
    color: var(--ink2);
    transition: color 0.2s;
    display: flex; align-items: center; gap: 12px;
  }
  .nav-link:hover { color: var(--ink); }
  .nav-link.active { color: var(--accent); }
  .nav-link .num {
    font-size: 14px;
    opacity: 0.5;
    font-weight: 400;
  }
  .nav-link.active .num { opacity: 1; color: var(--accent); }
  .nav-link.active::after {
    content: '';
    position: absolute;
    left: 28px; right: 28px;
    bottom: 8px;
    height: 3px;
    background: var(--accent);
  }
  .nav-right {
    display: flex; align-items: center; gap: 14px;
  }
  .nav-icon-btn {
    width: 60px; height: 60px;
    border: 2px solid var(--ink);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    color: var(--ink);
  }
  .nav-icon-btn:hover { background: var(--ink); color: var(--bg); transform: translate(-2px, -2px); box-shadow: 4px 4px 0 var(--accent); }
  .nav-icon-btn svg { width: 28px; height: 28px; }

  /* ====== VIEWPORT ====== */
  main.view {
    padding-top: 122px;
    min-height: 100vh;
    animation: viewIn 0.45s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes viewIn {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ====== SHARED BUTTONS ====== */
  .btn-primary, .btn-secondary {
    display: inline-flex; align-items: center; gap: 14px;
    font-family: var(--ff-mono);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 20px 32px;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--ink);
    color: var(--bg);
    border: 2px solid var(--ink);
  }
  .btn-primary:hover { background: var(--accent); border-color: var(--accent); transform: translate(-3px, -3px); box-shadow: 6px 6px 0 var(--ink); }
  .btn-secondary {
    border: 2px solid var(--ink);
    color: var(--ink);
    background: transparent;
  }
  .btn-secondary:hover { background: var(--ink); color: var(--bg); transform: translate(-3px, -3px); box-shadow: 6px 6px 0 var(--accent); }
  .btn-primary svg, .btn-secondary svg { width: 18px; height: 18px; }

  /* ====== PAGE HEADER ====== */
  .page-header {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin-bottom: 64px;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 28px;
    gap: 40px;
  }
  .page-title {
    font-family: var(--ff-display);
    font-size: clamp(72px, 11vw, 168px);
    line-height: 0.88;
    letter-spacing: 0;
  }
  .page-meta {
    text-align: right;
    display: grid;
    gap: 4px;
  }
  .page-meta-num {
    font-family: var(--ff-display);
    font-size: 40px;
    color: var(--accent);
    line-height: 1;
  }
  .page-meta-text {
    font-family: var(--ff-mono);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink2);
  }

  /* ====== HOME ====== */
  .home {
    min-height: calc(100vh - 122px);
    display: grid;
    grid-template-rows: 1fr auto;
    padding: 0 48px 48px;
    position: relative;
    overflow: hidden;
  }
  .home-grid {
    display: grid;
    grid-template-columns: 1.15fr 0.85fr;
    align-items: center;
    gap: 60px;
    padding-top: 32px;
  }
  .home-left { position: relative; z-index: 2; }
  .home-tag {
    display: inline-flex; align-items: center; gap: 14px;
    font-family: var(--ff-mono);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 28px;
  }
  .home-tag::before {
    content: '';
    width: 36px; height: 2px;
    background: var(--accent);
  }
  .home-name {
    font-family: var(--ff-display);
    font-size: clamp(96px, 13vw, 200px);
    line-height: 0.86;
    letter-spacing: 0;
  }
  .home-name .second-line {
    display: block;
    color: transparent;
    -webkit-text-stroke: 2.5px var(--ink);
  }
  .home-bio {
    margin-top: 32px;
    max-width: 560px;
    font-size: 22px;
    font-weight: 400;
    line-height: 1.5;
    color: var(--ink);
  }
  .home-bio strong {
    color: var(--ink);
    font-weight: 700;
    background: linear-gradient(transparent 60%, var(--accent-soft) 60%);
    padding: 0 4px;
  }
  .home-bio-sub {
    margin-top: 14px;
    max-width: 540px;
    font-size: 18px;
    color: var(--ink2);
    font-weight: 400;
  }
  .home-cta-row {
    display: flex; gap: 14px; flex-wrap: wrap;
    margin-top: 40px;
  }

  /* Home right side big visual */
  .home-right {
    position: relative;
    height: 100%;
    min-height: 520px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .home-stack-num {
    position: absolute;
    top: -20px; right: -30px;
    font-family: var(--ff-display);
    font-size: clamp(240px, 36vw, 520px);
    line-height: 1;
    color: transparent;
    -webkit-text-stroke: 2px rgba(212, 88, 26, 0.18);
    user-select: none;
    pointer-events: none;
  }
  .home-portrait-slot {
    position: relative;
    width: 360px;
    height: 460px;
    z-index: 2;
    border: 2px solid var(--ink);
    overflow: hidden;
  }
  .home-portrait-slot image-slot {
    width: 100%; height: 100%;
  }
  .home-portrait-deco {
    position: absolute;
    inset: 24px -24px -24px 24px;
    border: 2px solid var(--ink);
    z-index: 1;
    background: var(--accent);
  }

  .home-meta-row {
    display: grid;
    grid-template-columns: repeat(2, max-content);
    gap: 0;
    padding-top: 36px;
    border-top: 2px solid var(--ink);
    margin-top: 40px;
  }
  .meta-cell {
    padding: 0 28px;
    border-right: 1px solid var(--border);
  }
  .meta-cell:first-child { padding-left: 0; }
  .meta-cell:last-child { border-right: none; padding-right: 0; }
  .meta-cell .meta-label {
    font-family: var(--ff-mono);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: 10px;
  }
  .meta-cell .meta-value {
    font-family: var(--ff-display);
    font-size: 32px;
    letter-spacing: 0.02em;
    line-height: 1.05;
  }

  /* ====== WORK CATEGORY LANDING ====== */
  .work {
    padding: 56px 48px 80px;
  }
  .category-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
  }
  .category-card {
    position: relative;
    display: block;
    background: var(--card);
    border: 2px solid var(--ink);
    padding: 48px 44px 44px;
    min-height: 440px;
    transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s;
    overflow: hidden;
  }
  .category-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--ink);
    transform: translateY(101%);
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    z-index: 0;
  }
  .category-card:hover { transform: translate(-6px, -6px); box-shadow: 12px 12px 0 var(--ink); }
  .category-card:hover::before { transform: translateY(0); }
  .category-card:hover .cat-inner { color: var(--bg); }
  .category-card:hover .cat-arrow { color: var(--accent); transform: translateX(8px); }
  .category-card:hover .cat-count-bg { color: transparent; -webkit-text-stroke: 2px var(--accent); }
  .cat-inner {
    position: relative; z-index: 1;
    display: grid; gap: 20px;
    height: 100%;
    grid-template-rows: auto auto 1fr auto;
  }
  .cat-num {
    font-family: var(--ff-mono);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
  }
  .cat-title {
    font-family: var(--ff-display);
    font-size: clamp(56px, 7vw, 96px);
    line-height: 0.92;
    letter-spacing: 0.005em;
  }
  .cat-desc {
    font-size: 19px;
    line-height: 1.5;
    color: inherit;
    opacity: 0.85;
    max-width: 480px;
  }
  .cat-count-bg {
    position: absolute;
    bottom: -30px; right: -10px;
    font-family: var(--ff-display);
    font-size: clamp(180px, 24vw, 320px);
    line-height: 1;
    color: transparent;
    -webkit-text-stroke: 2px rgba(13,12,10,0.08);
    user-select: none;
    pointer-events: none;
    z-index: 0;
    transition: all 0.3s;
  }
  .cat-foot {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 24px;
    border-top: 1.5px solid currentColor;
    opacity: 1;
  }
  .cat-foot-meta {
    font-family: var(--ff-mono);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .cat-arrow {
    font-family: var(--ff-mono);
    font-size: 32px;
    transition: all 0.3s;
  }

  /* ====== WORK LIST (filtered) ====== */
  .work-list {
    padding: 40px 48px 80px;
  }
  .work-back {
    display: inline-flex; align-items: center; gap: 12px;
    font-family: var(--ff-mono);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink2);
    margin-bottom: 28px;
    padding: 12px 20px;
    border: 2px solid var(--ink);
    transition: all 0.2s;
  }
  .work-back:hover { background: var(--ink); color: var(--bg); }
  .work-back svg { width: 16px; height: 16px; }

  .work-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 32px;
  }
  .work-card {
    display: block;
    background: var(--card);
    border: 2px solid var(--ink);
    overflow: hidden;
    transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s;
    position: relative;
  }
  .work-card:hover {
    transform: translate(-6px, -6px);
    box-shadow: 12px 12px 0 var(--ink);
  }
  .work-card-media {
    width: 100%;
    aspect-ratio: 16 / 10;
    background: linear-gradient(135deg, #ECE9E1 0%, #D9D4C7 100%);
    position: relative;
    overflow: hidden;
    border-bottom: 2px solid var(--ink);
  }
  .work-card-media image-slot {
    width: 100%; height: 100%; display: block;
  }
  .work-card-badge {
    position: absolute;
    top: 16px; left: 16px;
    background: var(--ink);
    color: var(--bg);
    font-family: var(--ff-mono);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.14em;
    padding: 8px 14px;
    text-transform: uppercase;
    z-index: 2;
  }
  .work-card-badge.team { background: var(--accent); }
  .work-card-body {
    padding: 32px 32px 30px;
    display: grid;
    gap: 16px;
  }
  .work-card-top {
    display: flex; align-items: baseline; justify-content: space-between; gap: 18px;
  }
  .work-card-name {
    font-family: var(--ff-display);
    font-size: 52px;
    line-height: 0.95;
    letter-spacing: 0.005em;
  }
  .work-card-year {
    font-family: var(--ff-mono);
    font-size: 14px;
    font-weight: 700;
    color: var(--ink3);
    letter-spacing: 0.1em;
    white-space: nowrap;
  }
  .work-card-desc {
    font-size: 18px;
    color: var(--ink2);
    line-height: 1.5;
    font-weight: 400;
  }
  .work-card-foot {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 8px;
    padding-top: 20px;
    border-top: 1.5px solid var(--border);
  }
  .work-card-tags {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .work-card-tag {
    font-family: var(--ff-mono);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1.5px solid var(--accent);
    padding: 6px 12px;
  }
  .work-card-arrow {
    font-family: var(--ff-mono);
    font-size: 26px;
    color: var(--ink);
    transition: transform 0.3s;
    font-weight: 700;
  }
  .work-card:hover .work-card-arrow { transform: translateX(8px); color: var(--accent); }

  /* ====== PROJECT DETAIL ====== */
  .project {
    padding: 40px 48px 100px;
  }
  .back-link {
    display: inline-flex; align-items: center; gap: 12px;
    font-family: var(--ff-mono);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink);
    margin-bottom: 36px;
    padding: 12px 20px;
    border: 2px solid var(--ink);
    transition: all 0.2s;
  }
  .back-link:hover { background: var(--ink); color: var(--bg); transform: translate(-2px, -2px); box-shadow: 4px 4px 0 var(--accent); }
  .back-link svg { width: 16px; height: 16px; }

  .project-header {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 60px;
    align-items: end;
    margin-bottom: 56px;
    padding-bottom: 32px;
    border-bottom: 2px solid var(--ink);
  }
  .project-title {
    font-family: var(--ff-display);
    font-size: clamp(72px, 9.5vw, 152px);
    line-height: 0.9;
    letter-spacing: 0;
  }
  .project-subtitle {
    font-size: 17px;
    font-weight: 700;
    color: var(--accent);
    font-family: var(--ff-mono);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  .project-meta {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 28px 32px;
  }
  .project-meta-cell .label {
    font-family: var(--ff-mono);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: 8px;
  }
  .project-meta-cell .value {
    font-family: var(--ff-display);
    font-size: 26px;
    letter-spacing: 0.02em;
    line-height: 1.1;
  }

  /* Hero media */
  .project-hero-media {
    width: 100%;
    aspect-ratio: 16 / 9;
    border: 2px solid var(--ink);
    background: linear-gradient(135deg, #ECE9E1, #D9D4C7);
    margin-bottom: 64px;
    overflow: hidden;
  }
  .project-hero-media image-slot { width: 100%; height: 100%; }

  /* Video slot */
  .video-slot {
    width: 100%;
    aspect-ratio: 16 / 9;
    border: 2px solid var(--ink);
    background: var(--ink);
    color: #FAFAF6;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    gap: 16px;
    position: relative;
    margin-bottom: 64px;
    overflow: hidden;
  }
  .video-slot video, .video-slot iframe {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    border: 0;
  }
  .video-slot .video-placeholder {
    text-align: center;
    z-index: 2;
    padding: 20px;
  }
  .video-slot .play-icon {
    width: 80px; height: 80px;
    border: 2px solid #FAFAF6;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 18px;
  }
  .video-slot .play-icon::after {
    content: '';
    width: 0; height: 0;
    border-left: 22px solid #FAFAF6;
    border-top: 13px solid transparent;
    border-bottom: 13px solid transparent;
    margin-left: 6px;
  }
  .video-slot .video-label {
    font-family: var(--ff-mono);
    font-size: 14px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    opacity: 0.85;
    font-weight: 700;
  }

  /* Content blocks */
  .project-body {
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 40px 64px;
    margin-bottom: 56px;
  }
  .project-section-label {
    font-family: var(--ff-mono);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    padding-top: 8px;
  }
  .project-section-content {
    font-size: 21px;
    line-height: 1.55;
    color: var(--ink);
    font-weight: 400;
  }
  .project-section-content ul {
    list-style: none;
    display: grid;
    gap: 18px;
  }
  .project-section-content li {
    position: relative;
    padding-left: 32px;
  }
  .project-section-content li::before {
    content: '→';
    position: absolute;
    left: 0; top: 0;
    color: var(--accent);
    font-family: var(--ff-mono);
    font-weight: 700;
    font-size: 22px;
  }

  /* Media gallery */
  .gallery-label {
    font-family: var(--ff-mono);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink2);
    margin-bottom: 20px;
  }
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }
  .gallery-slot {
    aspect-ratio: 4 / 3;
    border: 2px solid var(--ink);
    overflow: hidden;
    background: linear-gradient(135deg, #ECE9E1, #D9D4C7);
  }

/* =====================================================
   ROUTING
   ===================================================== */

function useHashRoute() {
  const [hash, setHash] = useState(window.location.hash || '#home');
  useEffect(() => {
    const onChange = () => {
      setHash(window.location.hash || '#home');
      window.scrollTo(0, 0);
    };
    window.addEventListener('hashchange', onChange);
    return () => window.removeEventListener('hashchange', onChange);
  }, []);
  return hash;
}

function parseRoute(hash) {
  const cleaned = hash.replace(/^#\/?/, '') || 'home';
  const [page, ...rest] = cleaned.split('/');
  return { page, params: rest };
}

/* =====================================================
   APP
   ===================================================== */

function App() {
  const hash = useHashRoute();
  const route = parseRoute(hash);
  let view;
  switch (route.page) {
    case 'home':
      view = <Home />; break;
    case 'work':
      if (route.params[0] === 'team' || route.params[0] === 'solo') {
        view = <WorkList category={route.params[0]} />;
      } else {
        view = <Work />;
      }
      break;
    case 'project':
      view = <ProjectDetail id={route.params[0]} />; break;
    case 'about':
      view = <About />; break;
    case 'contact':
      view = <Contact />; break;
    default:
      view = <Home />;
  }
  return (
    <>
      <Nav currentPage={route.page} />
      {view}
    </>
  );
}
